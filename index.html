<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MinhasPatas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { margin: 0; padding: 0; height: 100%; background: #FBFAF7; }
      ::-webkit-scrollbar { display: none; }
      * { scrollbar-width: none; }
      button { font-family: inherit; cursor: pointer; }

      @keyframes slideInRight {
        from { transform: translateX(100%); opacity: 0.6; }
        to   { transform: translateX(0);    opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-40%); opacity: 0.6; }
        to   { transform: translateX(0);    opacity: 1; }
      }
      @keyframes slideInUp {
        from { transform: translateY(28px); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes popIn {
        0%   { transform: scale(0.93); opacity: 0; }
        70%  { transform: scale(1.02); }
        100% { transform: scale(1);    opacity: 1; }
      }
      .screen-enter-forward { animation: slideInRight 0.32s cubic-bezier(0.22,0.61,0.36,1) both; }
      .screen-enter-back    { animation: slideInLeft  0.28s cubic-bezier(0.22,0.61,0.36,1) both; }
      .screen-enter-modal   { animation: slideInUp    0.30s cubic-bezier(0.22,0.61,0.36,1) both; }

      .pressable {
        transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.12s;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      .pressable:active { transform: scale(0.95) !important; }

      .btn-press {
        transition: transform 0.1s, opacity 0.1s;
        -webkit-tap-highlight-color: transparent;
      }
      .btn-press:active { transform: scale(0.96); opacity: 0.85; }

      .nav-item {
        transition: background 0.18s, transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
        -webkit-tap-highlight-color: transparent;
      }
      .nav-item:active { transform: scale(0.88); }

      .check-bubble {
        transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), background 0.15s, border-color 0.15s;
      }
      .check-bubble:active { transform: scale(0.85); }

      .toggle-track {
        transition: background 0.22s cubic-bezier(0.4,0,0.2,1);
      }
      .toggle-thumb {
        transition: left 0.22s cubic-bezier(0.34,1.56,0.64,1);
      }

      .progress-bar {
        transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.45; }
      }
      .pulse { animation: pulse 1.4s ease-in-out infinite; }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      .spin { animation: spin 0.9s linear infinite; }

      @keyframes shimmer {
        0%   { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }
      .shimmer {
        background: linear-gradient(90deg, #f0ece4 25%, #e8e3db 50%, #f0ece4 75%);
        background-size: 800px 100%;
        animation: shimmer 1.5s infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
